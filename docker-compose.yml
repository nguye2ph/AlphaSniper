services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha_dev_only
      POSTGRES_DB: alpha_sniper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8200:8200"
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      POSTGRES_URL: postgresql+asyncpg://alpha:alpha_dev_only@postgres:5432/alpha_sniper
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: uv run uvicorn src.api.main:app --host 0.0.0.0 --port 8200 --reload

  collector:
    build: .
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      POSTGRES_URL: postgresql+asyncpg://alpha:alpha_dev_only@postgres:5432/alpha_sniper
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: echo "Collector not implemented yet"
    profiles:
      - full

  worker:
    build: .
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      POSTGRES_URL: postgresql+asyncpg://alpha:alpha_dev_only@postgres:5432/alpha_sniper
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: echo "Worker not implemented yet"
    profiles:
      - full

  beat:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: echo "Beat not implemented yet"
    profiles:
      - full

volumes:
  postgres_data:
  mongo_data:
  redis_data:
