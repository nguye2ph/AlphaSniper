services:
  traefik:
    image: traefik:v3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    command:
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alpha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-alpha_sniper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alpha}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8200:8200"
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-alpha}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-alpha_sniper}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=8200
    command: uv run uvicorn src.api.main:app --host 0.0.0.0 --port 8200
    restart: unless-stopped

  collector:
    build: .
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run python -m src.collectors.finnhub_ws
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-alpha}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-alpha_sniper}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run taskiq worker src.jobs.taskiq_app:broker
    restart: unless-stopped

  discord-listener:
    build: .
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run python -m src.collectors.discord_nuntio
    restart: unless-stopped

  scheduler:
    build: .
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-alpha}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-alpha_sniper}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    command: uv run taskiq scheduler src.jobs.taskiq_app:scheduler
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  traefik_certs:
